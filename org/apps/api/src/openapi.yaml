openapi: 3.0.3
info:
  title: Form API
  version: 1.0.0
paths:
  /submitform:
    post:
      summary: Gửi dữ liệu form
      tags:
        - Form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Gửi thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Yêu cầu không hợp lệ
